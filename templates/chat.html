<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#030b18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AURA">
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/static/icons/icon-512.png">
<link rel="apple-touch-icon" href="/static/icons/icon-512.png">
<title>AURA CHAT — Dashboard</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cyan:       #00e5ff;
  --purple:     #7c3aed;
  --green:      #10b981;
  --amber:      #f59e0b;
  --red:        #ef4444;
  --bg:         #030b18;
  --bg2:        #050f24;
  --panel:      rgba(4,16,40,0.88);
  --panelHov:   rgba(5,20,50,0.95);
  --border:     rgba(0,229,255,0.18);
  --borderBrt:  rgba(0,229,255,0.45);
  --text:       #c8e6f0;
  --textDim:    #4a7a8a;
  --shadow:     0 0 40px rgba(0,229,255,.07);
}
html,body { height:100%; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; }
body { background:var(--bg); color:var(--text); display:flex; flex-direction:column; }

/* ── Grid bg ─────────────────────────────────────────────── */
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(0,229,255,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,.025) 1px, transparent 1px);
  background-size:55px 55px;
}

/* ── HEADER ─────────────────────────────────────────────── */
header {
  position:relative; z-index:10;
  height:52px; min-height:52px;
  background:rgba(3,12,30,0.97);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 20px; gap:16px;
  box-shadow:0 2px 30px rgba(0,229,255,.08);
}
.header-logo { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.logo-hex {
  width:32px; height:32px; border:1.5px solid var(--cyan);
  border-radius:7px; display:flex; align-items:center; justify-content:center;
  font-size:16px; box-shadow:0 0 14px rgba(0,229,255,.4);
  animation:hexPulse 3s ease-in-out infinite;
}
@keyframes hexPulse{0%,100%{box-shadow:0 0 14px rgba(0,229,255,.35);}50%{box-shadow:0 0 28px rgba(0,229,255,.65);}}
.logo-text-name { font-size:13px; font-weight:800; letter-spacing:4px; color:var(--cyan);
  text-shadow:0 0 12px rgba(0,229,255,.7); }
.logo-text-sub { font-size:7.5px; letter-spacing:2px; color:var(--textDim); }
.header-title {
  flex:1; text-align:center; font-size:12px; letter-spacing:5px;
  color:var(--text); opacity:.7; font-weight:600;
}
.header-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.hdr-btn {
  width:32px; height:32px; border:1px solid var(--border); border-radius:7px;
  background:transparent; color:var(--textDim); cursor:pointer;
  display:flex; align-items:center; justify-content:center; font-size:15px;
  transition:all .2s;
}
.hdr-btn:hover { border-color:var(--cyan); color:var(--cyan); box-shadow:0 0 10px rgba(0,229,255,.2); }
.avatar-badge {
  display:flex; align-items:center; justify-content:center;
  width:32px; height:32px; border-radius:7px;
  font-size:12px; font-weight:700; color:#000; letter-spacing:.5px;
  border:1.5px solid rgba(0,0,0,.3);
}
.conn-indicator { display:flex; align-items:center; gap:5px; font-size:9px; letter-spacing:1.5px; color:var(--textDim); }
.conn-dot { width:7px;height:7px;border-radius:50%;background:#4a7a8a;animation:connBlink 2s infinite; }
.conn-dot.live { background:var(--green); box-shadow:0 0 8px var(--green); }
@keyframes connBlink{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ── MAIN LAYOUT ─────────────────────────────────────────── */
.main {
  flex:1; display:flex; overflow:hidden; position:relative; z-index:5;
  padding:12px; gap:10px;
}

/* ── LEFT PANEL – Online Users ───────────────────────────── */
.panel-left {
  width:230px; flex-shrink:0;
  background:var(--panel); border:1px solid var(--border); border-radius:10px;
  display:flex; flex-direction:column; overflow:hidden; position:relative;
}
.panel-scan-line {
  position:absolute; left:0; right:0; height:1px; pointer-events:none;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  animation:scanLine 5s ease-in-out infinite; opacity:.5;
}
@keyframes scanLine{0%{top:-2px;opacity:0;}5%{opacity:.7;}95%{opacity:.3;}100%{top:102%;opacity:0;}}
.panel-header {
  padding:10px 14px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.panel-header-title { font-size:10px; letter-spacing:2.5px; color:var(--cyan); font-weight:700; }
.panel-header-dots  { color:var(--textDim); font-size:16px; letter-spacing:3px; }
.users-list { flex:1; overflow-y:auto; padding:8px; }
.users-list::-webkit-scrollbar { width:3px; }
.users-list::-webkit-scrollbar-track { background:transparent; }
.users-list::-webkit-scrollbar-thumb { background:rgba(0,229,255,.2); border-radius:3px; }

.user-card {
  padding:9px 11px; border:1px solid var(--border); border-radius:7px;
  margin-bottom:7px; display:flex; align-items:center; gap:9px;
  cursor:pointer; transition:all .2s; position:relative; overflow:hidden;
}
.user-card::after {
  content:''; position:absolute; top:0; left:0; right:0; bottom:0;
  background:linear-gradient(135deg,rgba(0,229,255,.03),transparent);
  opacity:0; transition:opacity .2s;
}
.user-card:hover::after { opacity:1; }
.user-card:hover { border-color:rgba(0,229,255,.35); }
.user-card.self {
  border-color:rgba(0,229,255,.5);
  background:rgba(0,229,255,.05);
  box-shadow:0 0 15px rgba(0,229,255,.1);
}
.user-card.other { border-color:rgba(124,58,237,.4); background:rgba(124,58,237,.07); }
.user-avatar {
  width:30px; height:30px; border-radius:7px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; color:#0a0a0a;
}
.user-info { flex:1; min-width:0; }
.user-name { font-size:12px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.user-status { font-size:9px; color:var(--textDim); letter-spacing:.5px; margin-top:2px; }
.status-dot { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block;
  box-shadow:0 0 6px var(--green); animation:pulseDot 2s ease-in-out infinite; margin-right:3px; }
@keyframes pulseDot{0%,100%{transform:scale(1);}50%{transform:scale(1.3);}}
.check-icon { color:var(--cyan); font-size:13px; flex-shrink:0; }

/* Typing area */
.typing-area { padding:8px 14px; border-top:1px solid var(--border); min-height:28px; flex-shrink:0; }
.typing-text { font-size:9.5px; color:var(--textDim); font-style:italic; }
.typing-dots { display:inline-flex; gap:3px; }
.typing-dots span { width:4px; height:4px; background:var(--cyan); border-radius:50%;
  animation:bounce .9s ease-in-out infinite; }
.typing-dots span:nth-child(2){animation-delay:.15s;}
.typing-dots span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-5px);}}

/* ── RIGHT COLUMN ────────────────────────────────────────── */
.col-right { flex:1; display:flex; flex-direction:column; gap:10px; min-width:0; overflow:hidden; }

/* Chat Panel */
.panel-chat {
  flex:1; background:var(--panel); border:1px solid var(--border); border-radius:10px;
  display:flex; flex-direction:column; overflow:hidden; position:relative;
}
.chat-header {
  padding:10px 16px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.chat-header-title { font-size:10px; letter-spacing:2.5px; color:var(--cyan); font-weight:700; }
.badge-live {
  font-size:8.5px; letter-spacing:1.5px; padding:2px 8px; border-radius:3px;
  background:rgba(16,185,129,.12); border:1px solid var(--green); color:var(--green);
  animation:blinkBadge 2s ease-in-out infinite;
}
@keyframes blinkBadge{0%,100%{opacity:1;}50%{opacity:.5;}}

/* Messages */
.messages {
  flex:1; overflow-y:auto; padding:12px;
  display:flex; flex-direction:column; gap:6px;
}
.messages::-webkit-scrollbar{width:3px;}
.messages::-webkit-scrollbar-track{background:transparent;}
.messages::-webkit-scrollbar-thumb{background:rgba(0,229,255,.18);border-radius:3px;}

.msg-row {
  display:flex; gap:9px; animation:msgIn .3s ease both;
}
.msg-row.own { flex-direction:row-reverse; }
@keyframes msgIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

.msg-av {
  width:28px; height:28px; border-radius:6px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; color:#050f24; margin-top:2px;
}
.msg-body { max-width:65%; }
.msg-meta { display:flex; align-items:center; gap:7px; margin-bottom:4px; font-size:9.5px; }
.msg-row.own .msg-meta { flex-direction:row-reverse; }
.msg-sender { color:var(--cyan); font-weight:600; letter-spacing:.5px; }
.msg-time   { color:var(--textDim); }
.msg-badge-sent {
  font-size:8px; letter-spacing:1px; padding:1px 6px; border-radius:3px;
  background:rgba(0,229,255,.1); border:1px solid rgba(0,229,255,.4); color:var(--cyan);
}
.bubble {
  padding:9px 13px; border-radius:8px; border:1px solid var(--border);
  background:rgba(5,20,50,.8); font-size:13px; line-height:1.5;
  word-break:break-word;
}
.msg-row.own .bubble {
  border-color:rgba(124,58,237,.35);
  background:rgba(124,58,237,.1);
}
.bubble img {
  max-width:260px; max-height:200px; border-radius:6px; display:block;
  border:1px solid var(--border); cursor:zoom-in; transition:opacity .2s;
  margin-top:2px;
}
.bubble img:hover { opacity:.85; }

/* System message */
.sys-msg {
  text-align:center; padding:5px; font-size:10px; color:var(--textDim);
  letter-spacing:.5px; animation:msgIn .3s ease both;
}
.sys-msg span { background:rgba(0,229,255,.06); border:1px solid var(--border);
  border-radius:20px; padding:2px 10px; }

/* ── INPUT BAR ─────────────────────────────────────────── */
.input-bar {
  padding:10px 12px; border-top:1px solid var(--border);
  display:flex; gap:8px; align-items:flex-end; flex-shrink:0;
  background:rgba(3,10,26,.6);
}
.input-wrap { flex:1; position:relative; }
.msg-input {
  width:100%; padding:10px 14px; border-radius:7px;
  background:rgba(0,229,255,.04); border:1px solid var(--border);
  color:var(--text); font-size:13px; outline:none; resize:none;
  font-family:inherit; transition:all .2s; max-height:100px; line-height:1.4;
}
.msg-input:focus { border-color:rgba(0,229,255,.5); box-shadow:0 0 14px rgba(0,229,255,.1); }
.msg-input::placeholder { color:var(--textDim); }
.input-btn {
  height:40px; padding:0 16px; border-radius:7px; border:1px solid var(--border);
  background:transparent; color:var(--textDim); cursor:pointer; font-size:14px;
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition:all .2s; white-space:nowrap; flex-shrink:0;
}
.input-btn:hover { border-color:rgba(0,229,255,.5); color:var(--cyan); box-shadow:0 0 12px rgba(0,229,255,.15); }
.btn-send {
  background:linear-gradient(135deg, rgba(0,229,255,.15), rgba(124,58,237,.15));
  border-color:rgba(0,229,255,.4); color:var(--cyan);
  font-size:10px; letter-spacing:2px; font-weight:700;
  padding:0 18px;
}
.btn-send:hover { background:linear-gradient(135deg,rgba(0,229,255,.25),rgba(124,58,237,.25));
  box-shadow:0 0 20px rgba(0,229,255,.2); }
#fileInput { display:none; }

/* ── ACTIVITY LOG ────────────────────────────────────────── */
.panel-log {
  height:140px; flex-shrink:0;
  background:var(--panel); border:1px solid var(--border); border-radius:10px;
  display:flex; flex-direction:column; overflow:hidden; position:relative;
}
.log-header {
  padding:7px 14px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.log-header-title { font-size:10px; letter-spacing:2.5px; color:var(--purple); font-weight:700; }
.log-badge { font-size:8px; letter-spacing:1px; padding:2px 7px; border-radius:3px;
  background:rgba(124,58,237,.12); border:1px solid rgba(124,58,237,.4); color:var(--purple); }
.log-list { flex:1; overflow-y:auto; padding:0 6px; }
.log-list::-webkit-scrollbar{width:2px;}
.log-list::-webkit-scrollbar-thumb{background:rgba(124,58,237,.25);}

.log-item {
  display:flex; align-items:center; gap:10px; padding:5px 8px;
  border-bottom:1px solid rgba(0,229,255,.05); font-size:11px;
  animation:msgIn .3s ease both;
}
.log-item:last-child { border-bottom:none; }
.log-tag {
  font-size:8px; letter-spacing:1px; padding:2px 6px; border-radius:3px;
  font-weight:700; white-space:nowrap; flex-shrink:0;
}
.tag-join  { background:rgba(16,185,129,.12); border:1px solid var(--green); color:var(--green); }
.tag-leave { background:rgba(239,68,68,.1);   border:1px solid var(--red);   color:var(--red); }
.tag-img   { background:rgba(245,158,11,.1);  border:1px solid var(--amber); color:var(--amber); }
.tag-msg   { background:rgba(0,229,255,.08);  border:1px solid var(--cyan);  color:var(--cyan); }
.log-text  { flex:1; color:var(--text); }
.log-time  { color:var(--textDim); font-size:9.5px; flex-shrink:0; }

/* ── Image Lightbox ─────────────────────────────────────── */
.lightbox {
  display:none; position:fixed; inset:0; z-index:100;
  background:rgba(3,8,20,.92); align-items:center; justify-content:center;
  backdrop-filter:blur(10px);
}
.lightbox.open { display:flex; }
.lightbox img { max-width:90vw; max-height:88vh; border-radius:10px;
  border:1px solid var(--border); box-shadow:0 0 60px rgba(0,229,255,.2); }
.lightbox-close {
  position:absolute; top:20px; right:25px;
  font-size:28px; color:var(--textDim); cursor:pointer; background:none; border:none;
  transition:color .2s;
}
.lightbox-close:hover { color:var(--cyan); }

/* ── Upload progress ─────────────────────────────────────── */
.upload-toast {
  display:none; position:fixed; bottom:80px; right:20px; z-index:50;
  background:var(--panel); border:1px solid var(--border); border-radius:8px;
  padding:10px 16px; font-size:11px; color:var(--cyan); letter-spacing:.5px;
  box-shadow:0 0 20px rgba(0,229,255,.15);
}
.upload-toast.show { display:block; animation:toastIn .3s ease; }
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

/* ── RESPONSIVE ─────────────────────────────────────────── */
/* Drawer overlay */
.drawer-overlay {
  display:none; position:fixed; inset:0; z-index:90;
  background:rgba(0,5,20,.78); backdrop-filter:blur(3px);
}
.drawer-overlay.visible { display:block; animation:fadeOvl .25s ease; }
@keyframes fadeOvl{from{opacity:0;}to{opacity:1;}}

/* Hamburger (desktop: hidden) */
.btn-hamburger { display:none; }

/* Smooth panel slide */
.panel-left { transition:left .3s cubic-bezier(.4,0,.2,1); }

/* ── Tablet ≤1100px ──────────────────── */
@media(max-width:1100px){
  .panel-left  { width:185px; }
  .panel-log   { height:110px; }
  .msg-body    { max-width:74%; }
  .header-title{ font-size:10px; letter-spacing:3px; }
}

/* ── Small tablet ≤767px ─────────────── */
@media(max-width:767px){
  .btn-hamburger{
    display:flex;align-items:center;justify-content:center;
    width:36px;height:36px;border:1px solid var(--border);border-radius:8px;
    background:transparent;color:var(--textDim);cursor:pointer;
    font-size:18px;flex-shrink:0;transition:all .2s;
  }
  .btn-hamburger:hover{border-color:var(--cyan);color:var(--cyan);}
  /* Left panel → slide-in drawer */
  .panel-left{
    position:fixed;left:-250px;top:52px;bottom:0;
    z-index:100;width:240px;border-radius:0 10px 10px 0;
  }
  .panel-left.drawer-open{
    left:0;box-shadow:8px 0 40px rgba(0,0,0,.75);
  }
  .header-title{ display:none; }
  .panel-log   { height:100px; }
  .main        { padding:8px;gap:8px; }
  .msg-body    { max-width:82%; }
}

/* ── Mobile ≤479px ───────────────────── */
@media(max-width:479px){
  header          { padding:0 10px;gap:8px; }
  .logo-text-sub  { display:none; }
  .logo-text-name { font-size:12px;letter-spacing:3px; }
  .conn-indicator { display:none; }
  .main           { padding:5px; }
  .panel-log      { display:none; }
  .messages       { padding:8px;gap:5px; }
  .msg-body       { max-width:88%; }
  .bubble         { padding:8px 11px;font-size:13px; }
  .bubble img     { max-width:100%;max-height:220px; }
  .msg-meta       { gap:5px; }
  .msg-av         { width:26px;height:26px;font-size:9px; }
  .input-bar      { padding:7px 6px;gap:5px; }
  .input-btn      { height:44px;min-width:44px;padding:0 12px;font-size:18px; }
  .btn-send       { font-size:9px;letter-spacing:1.5px;padding:0 14px; }
  .msg-input      { padding:11px 12px;font-size:14px; }
  .chat-header    { padding:8px 12px; }
  .panel-header   { padding:9px 12px; }
}

/* ── iOS / PWA Safe Area ─────────────────────────────── */
@supports(padding-bottom:env(safe-area-inset-bottom)){
  .input-bar{ padding-bottom:calc(7px + env(safe-area-inset-bottom)); }
}
@supports(padding-top:env(safe-area-inset-top)){
  header{ padding-top:env(safe-area-inset-top);
          height:calc(52px + env(safe-area-inset-top));
          min-height:calc(52px + env(safe-area-inset-top)); }
  .panel-left{ top:calc(52px + env(safe-area-inset-top)); }
  .drawer-overlay{ top:calc(52px + env(safe-area-inset-top)); }
  .lightbox{ padding-top:env(safe-area-inset-top);
             padding-bottom:env(safe-area-inset-bottom); }
}
/* Dynamic viewport (mobile browser chrome) */
@supports(height:100dvh){ body{ height:100dvh; } }
/* PWA standalone: notch/statusbar safe area */
@media(display-mode:standalone){
  header{ padding-top:max(env(safe-area-inset-top),12px);
          height:calc(52px + max(env(safe-area-inset-top),12px));
          min-height:calc(52px + max(env(safe-area-inset-top),12px)); }
  .panel-left{ top:calc(52px + max(env(safe-area-inset-top),12px)); }
  .drawer-overlay{ top:calc(52px + max(env(safe-area-inset-top),12px)); }
  .main{ padding-bottom:env(safe-area-inset-bottom,0px); }
}
</style>
</head>
<body>

<!-- Drawer overlay (mobile) -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- ── HEADER ─────────────────────────────────────────────── -->
<header>
  <button class="btn-hamburger" id="hamburgerBtn" onclick="toggleDrawer()" title="Danh sách online">☰</button>
  <div class="header-logo">
    <div class="logo-hex">⬡</div>
    <div>
      <div class="logo-text-name">AURA</div>
      <div class="logo-text-sub">AI ASSISTANT</div>
    </div>
  </div>
  <div class="header-title">CHAT DASHBOARD</div>
  <div class="header-right">
    <div class="conn-indicator">
      <div class="conn-dot" id="connDot"></div>
      <span id="connText">CONNECTING</span>
    </div>
    <div class="hdr-btn" title="Đăng xuất" onclick="location.href='/logout'">⏻</div>
    <div class="avatar-badge" id="headerAvatar" title="{{ username }}"></div>
  </div>
</header>

<!-- ── MAIN ──────────────────────────────────────────────── -->
<div class="main">

  <!-- LEFT: Online Users -->
  <div class="panel-left" id="panelLeft">
    <div class="panel-scan-line"></div>
    <div class="panel-header">
      <span class="panel-header-title">ONLINE USERS</span>
      <span class="panel-header-dots" id="onlineCount">···</span>
    </div>
    <div class="users-list" id="usersList">
      <div class="sys-msg"><span>Đang kết nối...</span></div>
    </div>
    <div class="typing-area" id="typingArea" style="display:none">
      <div class="typing-text">
        <span id="typingName"></span> đang nhập
        <span class="typing-dots"><span></span><span></span><span></span></span>
      </div>
    </div>
  </div>

  <!-- RIGHT COLUMN -->
  <div class="col-right">

    <!-- Chat Panel -->
    <div class="panel-chat">
      <div class="panel-scan-line" style="animation-delay:2s"></div>
      <div class="chat-header">
        <span class="chat-header-title">CHAT ROOM</span>
        <div style="display:flex;gap:8px;align-items:center;">
          <span id="msgCount" style="font-size:9px;color:var(--textDim);letter-spacing:1px;"></span>
          <span class="badge-live">● LIVE</span>
        </div>
      </div>

      <div class="messages" id="messages">
        <div class="sys-msg"><span>⟳ Đang tải tin nhắn...</span></div>
      </div>

      <!-- Input -->
      <div class="input-bar">
        <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
        <button class="input-btn" title="Đính kèm ảnh" onclick="document.getElementById('fileInput').click()">📎</button>
        <div class="input-wrap">
          <textarea class="msg-input" id="msgInput" rows="1"
            placeholder="Nhập tin nhắn..."
            oninput="autoGrow(this);handleTyping()"
            onkeydown="handleKey(event)"></textarea>
        </div>
        <button class="btn-send input-btn" onclick="sendMsg()">SEND ▶</button>
      </div>
    </div>

    <!-- Activity Log -->
    <div class="panel-log">
      <div class="log-header">
        <span class="log-header-title">ACTIVITY LOG</span>
        <span class="log-badge">AUTO</span>
      </div>
      <div class="log-list" id="logList">
        <div class="log-item">
          <span class="log-tag tag-msg">SYS</span>
          <span class="log-text">AURA Chat khởi động</span>
          <span class="log-time" id="startTime"></span>
        </div>
      </div>
    </div>

  </div><!-- /col-right -->
</div><!-- /main -->

<!-- Image lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<!-- Upload toast -->
<div class="upload-toast" id="uploadToast">⟳ Đang tải ảnh lên...</div>

<script>
// ── Current user (injected by Flask) ──────────────────────
const ME = {
  id:    "{{ user_id }}",
  name:  "{{ username }}",
  color: "{{ avatar_color }}"
};

// ── Init avatar in header ──────────────────────────────────
const hdrAv = document.getElementById('headerAvatar');
hdrAv.textContent    = ME.name.charAt(0).toUpperCase();
hdrAv.style.background = ME.color;

document.getElementById('startTime').textContent = fmtTime(new Date().toISOString());

// ── Socket.IO ──────────────────────────────────────────────
// Force polling transport (WebSocket not available on all hosts)
const socket = io({transports:['polling'], upgrade:false});
let typingTimeout = null;
const typingUsers = new Set();

socket.on('connect', () => {
  setConn(true);
});
socket.on('disconnect', () => {
  setConn(false);
  addLog('SYS', 'Mất kết nối, đang thử lại...', 'msg');
});

function setConn(ok){
  document.getElementById('connDot').className  = 'conn-dot' + (ok ? ' live' : '');
  document.getElementById('connText').textContent = ok ? 'LIVE' : 'OFFLINE';
}

// ── Online users ───────────────────────────────────────────
socket.on('online_users', users => renderUsers(users));
socket.on('user_joined', data => {
  renderUsers(data.online_users);
  addSysMsg(`${data.username} đã tham gia chat`);
  addLog('JOIN', `${data.username} đã tham gia`, 'join');
});
socket.on('user_left', data => {
  renderUsers(data.online_users);
  addSysMsg(`${data.username} đã rời chat`);
  addLog('EXIT', `${data.username} đã rời`, 'leave');
});

function renderUsers(users){
  const list = document.getElementById('usersList');
  list.innerHTML = '';
  document.getElementById('onlineCount').textContent = users.length;
  users.forEach(u => {
    const isSelf = u.user_id === ME.id;
    const card = document.createElement('div');
    card.className = `user-card ${isSelf ? 'self' : 'other'}`;
    const initials = u.username.charAt(0).toUpperCase();
    card.innerHTML = `
      ${isSelf ? '<span class="check-icon">✓</span>' : ''}
      <div class="user-avatar" style="background:${u.avatar_color}">${initials}</div>
      <div class="user-info">
        <div class="user-name">${escHtml(u.username)}${isSelf ? ' <span style="font-size:9px;color:var(--textDim)">(bạn)</span>' : ''}</div>
        <div class="user-status"><span class="status-dot"></span>${isSelf ? 'Active: Online' : 'Online'}</div>
      </div>
    `;
    list.appendChild(card);
  });
}

// ── Messages ───────────────────────────────────────────────
socket.on('new_message', msg => {
  appendMsg(msg);
  scrollBot();
  if(msg.type === 'image' && msg.sender_id !== ME.id)
    addLog('IMG', `${msg.sender_name} đã gửi ảnh`, 'img');
  updateMsgCount();
});

// Load history
async function loadHistory(){
  try{
    const r   = await fetch('/api/messages');
    const msgs = await r.json();
    const wrap = document.getElementById('messages');
    wrap.innerHTML = '';
    if(msgs.length === 0){
      wrap.innerHTML = '<div class="sys-msg"><span>Chưa có tin nhắn nào. Hãy bắt đầu!</span></div>';
      return;
    }
    msgs.forEach(m => appendMsg(m, false));
    scrollBot();
    updateMsgCount();
  }catch(e){
    console.error(e);
  }
}
loadHistory();

let msgCount = 0;
function updateMsgCount(){
  msgCount++;
  document.getElementById('msgCount').textContent = `${msgCount} MSG`;
}

function appendMsg(msg, animate=true){
  const wrap  = document.getElementById('messages');
  // Remove "no messages" placeholder
  const ph = wrap.querySelector('.sys-msg');
  if(ph) ph.remove();

  const isOwn = msg.sender_id === ME.id;
  const row   = document.createElement('div');
  row.className = `msg-row${isOwn ? ' own' : ''}`;
  if(!animate) row.style.animation = 'none';

  const initials = msg.sender_name.charAt(0).toUpperCase();
  const timeStr  = fmtTime(msg.timestamp);

  let content = '';
  if(msg.type === 'image'){
    content = `<img src="${msg.image_url}" alt="ảnh" loading="lazy" onclick="openLightbox('${msg.image_url}')">`;
  } else {
    content = escHtml(msg.content).replace(/\n/g, '<br>');
  }

  row.innerHTML = `
    <div class="msg-av" style="background:${msg.avatar_color}">${initials}</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-sender">${escHtml(msg.sender_name)}</span>
        <span class="msg-time">${timeStr}</span>
        ${isOwn ? '<span class="msg-badge-sent">SENT</span>' : ''}
      </div>
      <div class="bubble">${content}</div>
    </div>
  `;
  wrap.appendChild(row);
}

function addSysMsg(text){
  const wrap = document.getElementById('messages');
  const el   = document.createElement('div');
  el.className = 'sys-msg';
  el.innerHTML = `<span>${escHtml(text)}</span>`;
  wrap.appendChild(el);
  scrollBot();
}

// ── Typing ─────────────────────────────────────────────────
function handleTyping(){
  socket.emit('typing', {is_typing: true});
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(()=> socket.emit('typing',{is_typing:false}), 2000);
}

socket.on('user_typing', data => {
  if(data.is_typing) typingUsers.add(data.username);
  else               typingUsers.delete(data.username);
  renderTyping();
});

function renderTyping(){
  const area = document.getElementById('typingArea');
  if(typingUsers.size === 0){ area.style.display='none'; return; }
  area.style.display = '';
  const names = [...typingUsers].join(', ');
  document.getElementById('typingName').textContent = names;
}

// ── Send message ───────────────────────────────────────────
function sendMsg(){
  const inp = document.getElementById('msgInput');
  const txt = inp.value.trim();
  if(!txt) return;
  socket.emit('send_message', {content: txt});
  inp.value = '';
  inp.style.height = '';
  socket.emit('typing', {is_typing: false});
}

function handleKey(e){
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMsg();
  }
}

function autoGrow(el){
  el.style.height = '';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ── Image upload ───────────────────────────────────────────
async function handleFile(e){
  const file = e.target.files[0];
  if(!file) return;
  e.target.value = '';
  if(file.size > 10*1024*1024){ alert('File quá lớn (tối đa 10 MB)'); return; }

  showToast(true);
  const fd = new FormData();
  fd.append('file', file);
  try{
    const r = await fetch('/api/upload', {method:'POST', body:fd});
    const d = await r.json();
    if(!d.success) alert('Upload thất bại');
    else addLog('IMG', `Bạn đã gửi ảnh`, 'img');
  }catch(err){
    alert('Lỗi upload: ' + err.message);
  }
  showToast(false);
}

function showToast(on){
  document.getElementById('uploadToast').className = 'upload-toast' + (on?' show':'');
}

// ── Lightbox ───────────────────────────────────────────────
function openLightbox(url){
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeLightbox(); });

// ── Activity Log ───────────────────────────────────────────
const TAG_MAP = {
  join:  ['JOIN',  'tag-join'],
  leave: ['EXIT',  'tag-leave'],
  img:   ['IMAGE', 'tag-img'],
  msg:   ['SYS',   'tag-msg']
};
function addLog(label, text, type='msg'){
  const list = document.getElementById('logList');
  const [, cls] = TAG_MAP[type] || ['SYS','tag-msg'];
  const item = document.createElement('div');
  item.className = 'log-item';
  item.innerHTML = `
    <span class="log-tag ${cls}">${label}</span>
    <span class="log-text">${escHtml(text)}</span>
    <span class="log-time">${fmtTime(new Date().toISOString())}</span>
  `;
  list.appendChild(item);
  list.scrollTop = list.scrollHeight;
  // Keep max 50 log items
  while(list.children.length > 50) list.removeChild(list.firstChild);
}

// ── Helpers ────────────────────────────────────────────────
function scrollBot(){
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

function fmtTime(iso){
  const d = new Date(iso);
  return d.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit',hour12:false});
}

function escHtml(str){
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Mobile drawer ─────────────────────────────────────────
function toggleDrawer(){
  const panel   = document.getElementById('panelLeft');
  const overlay = document.getElementById('drawerOverlay');
  const open    = panel.classList.toggle('drawer-open');
  overlay.classList.toggle('visible', open);
  document.getElementById('hamburgerBtn').textContent = open ? '✕' : '☰';
}
function closeDrawer(){
  document.getElementById('panelLeft')      .classList.remove('drawer-open');
  document.getElementById('drawerOverlay')  .classList.remove('visible');
  document.getElementById('hamburgerBtn').textContent = '☰';
}
// Close drawer when a message is sent on mobile
const _origSend = sendMsg;
// Close drawer on swipe left (mobile UX)
(function(){
  let sx=0;
  document.addEventListener('touchstart', e=>{ sx=e.touches[0].clientX; },{passive:true});
  document.addEventListener('touchend',   e=>{
    const dx = e.changedTouches[0].clientX - sx;
    if(dx < -60) closeDrawer();   // swipe left → close
    if(dx >  60 && sx < 30){      // swipe right from edge → open
      const panel=document.getElementById('panelLeft');
      if(!panel.classList.contains('drawer-open')) toggleDrawer();
    }
  },{passive:true});
})();

// ── PWA: Register Service Worker ────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/static/sw.js')
    .then(() => {
      console.log('SW registered');
      initPushNotifications();
    })
    .catch(e => console.log('SW reg failed:', e));
}

// ── Push Notification ────────────────────────────────────
async function initPushNotifications(){
  if(!('Notification' in window) || !('PushManager' in window)) return;
  if(Notification.permission === 'denied') return;

  const reg = await navigator.serviceWorker.ready;
  let sub = await reg.pushManager.getSubscription();
  if(sub) return;  // already subscribed

  // Get VAPID public key from server
  let resp;
  try{
    resp = await fetch('/api/vapid-public-key');
  }catch{ return; }
  if(!resp.ok) return;
  const {key} = await resp.json();

  // Request permission
  const permission = await Notification.requestPermission();
  if(permission !== 'granted') return;

  try{
    sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlB64ToUint8Array(key)
    });
    await fetch('/api/subscribe', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(sub.toJSON())
    });
    console.log('Push subscribed');
  }catch(e){
    console.log('Push sub failed:', e);
  }
}

function urlB64ToUint8Array(b64){
  const padding = '='.repeat((4 - b64.length % 4) % 4);
  const raw = atob((b64 + padding).replace(/-/g,'+').replace(/_/g,'/'));
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

</script>
</body>
</html>
