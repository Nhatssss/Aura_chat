<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030b18"/>
      <stop offset="100%" style="stop-color:#050f24"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)" stroke="#00e5ff" stroke-width="6"/>
  <!-- Hexagon -->
  <polygon points="256,80 396,160 396,352 256,432 116,352 116,160" fill="none" stroke="#00e5ff" stroke-width="20" stroke-linejoin="round"/>
  <!-- Inner glow -->
  <polygon points="256,130 356,190 356,322 256,382 156,322 156,190" fill="rgba(0,229,255,0.08)" stroke="#7c3aed" stroke-width="8" stroke-linejoin="round"/>
  <!-- A letter -->
  <text x="256" y="320" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="180" fill="#00e5ff" filter="url(#glow)">A</text>
</svg>
